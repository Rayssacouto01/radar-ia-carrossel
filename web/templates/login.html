<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Radar IA — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background:
        radial-gradient(circle at 15% -10%, oklch(64% 0.19 42 / 0.09), transparent 25%),
        radial-gradient(circle at 90% 10%, oklch(55% 0.1 40 / 0.07), transparent 25%),
        oklch(15% 0.004 60);
      font-family: 'Inter', sans-serif;
    }
    form {
      width: 300px;
      background: oklch(90% 0.01 60 / 0.055);
      backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      border: 1px solid oklch(95% 0.01 60 / 0.13); border-radius: 24px; padding: 36px;
      box-shadow: 0 24px 60px -24px rgba(0,0,0,0.65), inset 0 1px 0 oklch(100% 0 0 / 0.07);
    }
    h1 {
      color: oklch(96% 0.002 60); font-family: 'Manrope', sans-serif; font-weight: 800;
      font-size: 19px; margin: 0 0 22px; letter-spacing: -0.01em;
    }
    input {
      width: 100%; padding: 14px 16px; border-radius: 14px;
      background: oklch(90% 0.01 60 / 0.05); backdrop-filter: blur(10px);
      border: 1px solid oklch(95% 0.01 60 / 0.14); color: oklch(96% 0.002 60);
      font-size: 15px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s;
    }
    input::placeholder { color: oklch(55% 0.01 60); }
    input:focus { border-color: oklch(64% 0.19 42 / 0.7); }
    button {
      width: 100%; margin-top: 16px; padding: 14px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, oklch(64% 0.19 42), oklch(70% 0.17 55));
      color: white; font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 15px;
      cursor: pointer; box-shadow: 0 14px 34px -12px oklch(64% 0.19 42 / 0.55);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 18px 40px -12px oklch(64% 0.19 42 / 0.65); }
    .error { color: oklch(75% 0.15 25); font-size: 13px; margin: 14px 0 0; }
  </style>
</head>
<body>
  <form method="post">
    <h1>🤖 Radar IA</h1>
    <input type="password" name="password" placeholder="Senha" autofocus required>
    <button type="submit">Entrar</button>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
  </form>
</body>
</html>
